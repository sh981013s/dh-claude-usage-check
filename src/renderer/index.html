<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Claude Usage</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="background-glow"></div>
    <div class="card">
      <div class="top-row">
        <div>
          <div class="title">DeliveryHero proxy usage monitor</div>
        </div>
        <div class="pill" id="statusPill">SYNC</div>
      </div>

      <div class="health-row" id="healthRow">
        <span class="label">Service health</span>
        <span class="health-pill unknown" id="healthPill">Unknown</span>
      </div>

      <div class="hero">
        <div class="hero-label" id="heroLabel">Current (5h)</div>
        <div class="hero-value" id="heroSessionPercent">—%</div>
      </div>

      <div class="bars">
        <div class="bar-row">
          <div class="bar-meta">
            <span class="label" id="sessionWindowLabel">5h window</span>
            <span class="value" id="sessionPercent">—%</span>
          </div>
          <div class="progress"><div class="progress-fill" id="sessionBar"></div></div>
        </div>
        <div class="bar-row" id="weeklyRow">
          <div class="bar-meta">
            <span class="label">7d window</span>
            <span class="value" id="weeklyPercent">—%</span>
          </div>
          <div class="progress"><div class="progress-fill weekly" id="weeklyBar"></div></div>
        </div>
      </div>

      <div class="metrics-grid">
        <div class="metric" id="sessionResetCard">
          <div class="label">5h Reset</div>
          <div class="value mono" id="sessionReset">—</div>
          <div class="hint" id="sessionResetAt">—</div>
        </div>
        <div class="metric" id="weeklyResetCard">
          <div class="label">7d Reset</div>
          <div class="value mono" id="weeklyReset">—</div>
          <div class="hint" id="weeklyResetAt">—</div>
        </div>
      </div>

      <div class="chart-card" id="trendCard">
        <div class="chart-title">Daily Usage (Last 4 Days)</div>
        <svg id="usageChart" viewBox="0 0 300 84" preserveAspectRatio="none">
          <line x1="0" y1="84" x2="300" y2="84" class="chart-axis" />
          <rect id="dayBar0" class="day-bar" x="16" y="84" width="48" height="0"></rect>
          <rect id="dayBar1" class="day-bar" x="88" y="84" width="48" height="0"></rect>
          <rect id="dayBar2" class="day-bar" x="160" y="84" width="48" height="0"></rect>
          <rect id="dayBar3" class="day-bar" x="232" y="84" width="48" height="0"></rect>
          <text id="dayLabel0" class="day-label" x="40" y="80" text-anchor="middle"></text>
          <text id="dayLabel1" class="day-label" x="112" y="80" text-anchor="middle"></text>
          <text id="dayLabel2" class="day-label" x="184" y="80" text-anchor="middle"></text>
          <text id="dayLabel3" class="day-label" x="256" y="80" text-anchor="middle"></text>
        </svg>
      </div>

      <div class="fallback" id="fallbackCard">
        <div class="metric">
          <div class="label">Spend / Budget</div>
          <div class="value" id="usageRemLimit">— / —</div>
        </div>
        <div class="metric" id="fallbackResetMetric">
          <div class="label">Fallback Reset</div>
          <div class="value mono" id="usageReset">—</div>
        </div>
      </div>

      <div class="budget-card" id="budgetCard">
        <div class="budget-title">Manual budget (USD)</div>
        <div class="budget-row">
          <input id="manualBudgetInput" type="number" step="0.01" min="0" placeholder="e.g. 50" />
          <button id="saveBudgetBtn" class="secondary">Save budget</button>
        </div>
        <div class="hint" id="budgetHint">Used when proxy only returns spend.</div>
      </div>

      <div class="meta" id="usageMeta">—</div>
      <button id="refreshBtn">Refresh now</button>
    </div>
    <script src="app.js"></script>
  </body>
</html>
